<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden Shed Builder — Design Your Perfect Shed</title>
  <meta name="description" content="Interactive garden shed configurator with 2D blueprint editor and real-time 3D preview. Design your dream shed in minutes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <!-- Top Toolbar -->
  <header id="toolbar">
    <div class="toolbar-brand">
      <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <h1>Shed Builder</h1>
    </div>
    <div class="toolbar-modes" id="toolbar-modes">
      <button class="mode-btn active" data-mode="drag" id="mode-drag" title="Drag to resize">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
        <span>Drag</span>
      </button>
      <button class="mode-btn" data-mode="door" id="mode-door" title="Add door">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 2h11a2 2 0 012 2v16a2 2 0 01-2 2H5V2z"/><circle cx="14" cy="12" r="1"/></svg>
        <span>Door</span>
      </button>
      <button class="mode-btn" data-mode="window" id="mode-window" title="Add window">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        <span>Window</span>
      </button>
    </div>
    <div class="toolbar-actions">
      <button class="action-btn" id="btn-reset" title="Reset to defaults">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        <span>Reset</span>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <main id="app">
    <!-- Left Config Panel -->
    <aside id="config-panel">
      <div class="panel-section" id="section-dimensions">
        <div class="section-header" data-toggle="dimensions">
          <h2>Dimensions</h2>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="section-body">
          <label class="slider-label">
            <span>Width</span>
            <span class="slider-value" id="val-width">3000mm</span>
          </label>
          <input type="range" id="slider-width" min="1500" max="8000" step="100" value="3000" />
          <label class="slider-label">
            <span>Depth</span>
            <span class="slider-value" id="val-depth">2400mm</span>
          </label>
          <input type="range" id="slider-depth" min="1500" max="6000" step="100" value="2400" />
          <label class="slider-label">
            <span>Wall Height</span>
            <span class="slider-value" id="val-wallHeight">2200mm</span>
          </label>
          <input type="range" id="slider-wallHeight" min="1800" max="3000" step="100" value="2200" />
        </div>
      </div>

      <div class="panel-section" id="section-wall">
        <div class="section-header" data-toggle="wall">
          <h2>Wall Thickness</h2>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="section-body">
          <div class="radio-group" id="wall-thickness-group">
            <label class="radio-card">
              <input type="radio" name="wallThickness" value="28" />
              <span class="radio-visual">28mm</span>
            </label>
            <label class="radio-card active">
              <input type="radio" name="wallThickness" value="44" checked />
              <span class="radio-visual">44mm</span>
            </label>
          </div>
        </div>
      </div>

      <div class="panel-section" id="section-wood">
        <div class="section-header" data-toggle="wood">
          <h2>Wood Type</h2>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="section-body">
          <div class="select-wrapper">
            <select id="select-wood">
              <option value="spruce" selected>🌲 Spruce</option>
              <option value="douglas">🌳 Douglas Fir</option>
              <option value="larch">🍂 Larch</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel-section" id="section-roof">
        <div class="section-header" data-toggle="roof">
          <h2>Roof Type</h2>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="section-body">
          <div class="radio-group" id="roof-type-group">
            <label class="radio-card active">
              <input type="radio" name="roofType" value="pent" checked />
              <span class="radio-visual">
                <svg viewBox="0 0 40 30" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="12" width="30" height="16"/><line x1="3" y1="12" x2="37" y2="8"/></svg>
                Pent
              </span>
            </label>
            <label class="radio-card">
              <input type="radio" name="roofType" value="apex" />
              <span class="radio-visual">
                <svg viewBox="0 0 40 30" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="14" width="30" height="14"/><polyline points="3,14 20,4 37,14"/></svg>
                Apex
              </span>
            </label>
          </div>
        </div>
      </div>

      <div class="panel-section" id="section-foundation">
        <div class="section-header" data-toggle="foundation">
          <h2>Foundation</h2>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="section-body">
          <div class="radio-group" id="foundation-group">
            <label class="radio-card active">
              <input type="radio" name="foundation" value="wood" checked />
              <span class="radio-visual">🪵 Wood</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="foundation" value="concrete" />
              <span class="radio-visual">🧱 Concrete</span>
            </label>
          </div>
        </div>
      </div>

      <div class="panel-section" id="section-openings">
        <div class="section-header" data-toggle="openings">
          <h2>Openings</h2>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="section-body">
          <p class="hint-text">Select "Door" or "Window" mode above, then click a wall in the blueprint to place.</p>
          <div id="openings-list"></div>
        </div>
      </div>
    </aside>

    <!-- Center: 2D Blueprint -->
    <section id="blueprint-panel">
      <div class="panel-label">2D Blueprint</div>
      <canvas id="blueprint-canvas"></canvas>
    </section>

    <!-- Right: 3D Preview -->
    <section id="preview-panel">
      <div class="panel-label">3D Preview</div>
      <div id="three-container"></div>
    </section>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
